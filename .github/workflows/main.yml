name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Agar code zip file mein hai, to yeh use khud extract kar dega
    - name: Unzip Project Code
      run: |
        if [ -f *.zip ]; then
          unzip *.zip -d ./extracted_project
          mv ./extracted_project/*/* . 2>/dev/null || mv ./extracted_project/* . 2>/dev/null
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        # Cache hata diya taake error na aaye

    - name: Grant Execute Permission
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Android-APK
        path: app/build/outputs/apk/debug/app-debug.apk
